<div class="flex h-screen bg-slate-50">
  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
    <div class="h-16 flex items-center px-6 border-b border-slate-200">
      <div class="flex items-center gap-2 text-primary-600 font-bold text-xl tracking-tight">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
        </svg>
        <span>HealthLink UI</span>
      </div>
    </div>
    
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      <a routerLink="/dashboard" routerLinkActive="bg-primary-50 text-primary-600 font-semibold" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100 transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        Dashboard
      </a>
      <a routerLink="/reports" routerLinkActive="bg-primary-50 text-primary-600 font-semibold" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100 transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Lab Reports
      </a>
      <!-- Mock links for realism -->
      <a routerLink="/dashboard" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100 transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Appointments
      </a>
    </nav>
    
    <!-- User Profile Snippet -->
    <div class="p-4 border-t border-slate-200">
      <div class="flex items-center">
        <img class="h-9 w-9 rounded-full bg-slate-200 object-cover" src="https://i.pravatar.cc/150?img=11" alt="User avatar">
        <div class="ml-3">
          <p class="text-sm font-medium text-slate-700 group-hover:text-slate-900">John Doe</p>
          <p class="text-xs font-medium text-slate-500 group-hover:text-slate-700">Patient</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 z-10">
      <div class="flex-1 flex">
        <div class="w-full max-w-md flex relative">
          <svg class="absolute left-3 top-2.5 h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input type="text" placeholder="Search reports, doctors, or tests..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-shadow text-sm" />
        </div>
      </div>
      
      <div class="ml-4 flex items-center md:ml-6 gap-4 relative">
        <button (click)="toggleNotifications()" class="bg-white p-1 rounded-full text-slate-400 hover:text-slate-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 relative">
          <span *ngIf="unreadCount > 0" class="absolute top-0 right-0 block h-4 w-4 rounded-full bg-red-500 text-white text-[10px] font-bold leading-none text-center pt-0.5">{{unreadCount}}</span>
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
        </button>

        <!-- Notifications Dropdown -->
        <div *ngIf="showNotifications" class="absolute right-0 top-10 mt-2 w-80 bg-white rounded-xl shadow-lg border border-slate-200 z-50">
          <div class="px-4 py-3 border-b border-slate-100 flex justify-between items-center">
            <h3 class="text-sm font-semibold text-slate-800">Notifications</h3>
            <button (click)="markAllRead()" class="text-xs text-primary-600 hover:text-primary-800">Mark all read</button>
          </div>
          <div class="max-h-80 overflow-y-auto">
            <div *ngIf="notifications.length === 0" class="p-4 text-center text-sm text-slate-500">No new notifications</div>
            <div *ngFor="let n of notifications" class="p-4 border-b border-slate-50 hover:bg-slate-50 cursor-pointer flex justify-between items-start" [ngClass]="{'bg-blue-50': !n.isRead}">
              <div>
                <p class="text-sm font-medium text-slate-800">{{n.title}}</p>
                <p class="text-xs text-slate-500 mt-1">{{n.message}}</p>
                <p class="text-[10px] text-slate-400 mt-1">{{n.createdAt | date:'shortTime'}}</p>
              </div>
              <button (click)="deleteNotification(n._id, $event)" class="text-slate-400 hover:text-red-500"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="flex-1 relative overflow-y-auto focus:outline-none px-6 py-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
